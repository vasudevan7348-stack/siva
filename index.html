<!DOCTYPE html>
<html lang="ta">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ungalukkaga ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --sad-bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --happy-bg: linear-gradient(135deg, #f6d365 0%, #fda085 40%, #f093fb 70%, #f5576c 100%);
            --btn2-bg: linear-gradient(135deg, #e91e8c, #ff4d6d);
            --btn1-bg: linear-gradient(135deg, #6c757d, #495057);
        }

        html,
        body {
            width: 100%;
            height: 100%;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
        }

        body {
            background: var(--sad-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            /* dvh handles mobile browser chrome */
            padding: 24px 16px;
            transition: background 1.2s ease;
            position: relative;
        }

        body.happy {
            background: var(--happy-bg);
        }

        /* SHAKE */
        body.shake {
            animation: bodyShake 0.5s ease;
        }

        @keyframes bodyShake {
            0% {
                transform: translateX(0);
            }

            15% {
                transform: translateX(-8px) rotate(-1deg);
            }

            30% {
                transform: translateX(8px) rotate(1deg);
            }

            45% {
                transform: translateX(-6px) rotate(-0.5deg);
            }

            60% {
                transform: translateX(6px) rotate(0.5deg);
            }

            75% {
                transform: translateX(-3px);
            }

            90% {
                transform: translateX(3px);
            }

            100% {
                transform: translateX(0);
            }
        }

        /* EMOJI RAIN */
        .emoji-rain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .rain-drop {
            position: absolute;
            opacity: 0;
            animation: rainFall linear infinite;
        }

        @keyframes rainFall {
            0% {
                opacity: .7;
                transform: translateY(-40px);
            }

            100% {
                opacity: 0;
                transform: translateY(110vh);
            }
        }

        /* CARD */
        .card {
            background: rgba(255, 255, 255, .07);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, .15);
            border-radius: 28px;
            padding: 36px 28px 40px;
            max-width: 540px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .4);
            transition: background 1.2s ease, border-color 1.2s ease;
            position: relative;
            z-index: 10;
        }

        body.happy .card {
            background: rgba(255, 255, 255, .25);
            border-color: rgba(255, 255, 255, .4);
            box-shadow: 0 20px 60px rgba(253, 160, 133, .4);
        }

        /* FLOATING EMOJI */
        .sub-emoji {
            font-size: clamp(2rem, 8vw, 2.8rem);
            margin-bottom: 14px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        /* HEADING */
        .heading {
            font-size: clamp(1rem, 4.2vw, 1.4rem);
            font-weight: 700;
            color: #cfd8e3;
            line-height: 1.55;
            margin-bottom: 28px;
            transition: color .8s;
        }

        body.happy .heading {
            color: #4a0e0e;
        }

        /* BUTTONS AREA — vertical stack, full width */
        .buttons-area {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: stretch;
            /* buttons fill the column width */
            width: 100%;
        }

        /* BTN BASE */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 50px;
            padding: 17px 22px;
            font-family: 'Nunito', sans-serif;
            font-size: clamp(0.82rem, 3.5vw, 1rem);
            font-weight: 700;
            cursor: pointer;
            line-height: 1.45;
            text-align: center;
            width: 100%;
            white-space: normal;
            /* allow text to wrap on small screens */
            word-break: keep-all;
            transition: transform .15s ease, box-shadow .2s ease, opacity .4s;
        }

        /* BTN 1 — sad / escaping */
        #btn1 {
            background: var(--btn1-bg);
            color: #e8e8e8;
            box-shadow: 0 6px 24px rgba(0, 0, 0, .35);
            /* starts in normal flow; JS makes it position:fixed on first escape */
        }

        /* Full-screen overlay that contains the escaping btn1 */
        #escapeZone {
            position: fixed;
            inset: 0;
            pointer-events: none;
            /* transparent to clicks everywhere EXCEPT btn1 */
            z-index: 9998;
            overflow: hidden;
            /* physical clip — btn1 can NEVER escape this box */
        }

        /* When btn1 is moved into the overlay */
        #btn1.floating {
            position: absolute;
            /* relative to #escapeZone, not the viewport */
            pointer-events: auto;
            width: min(80vw, 270px);
            white-space: normal;
            z-index: 9999;
        }

        #btn1:hover {
            box-shadow: 0 8px 30px rgba(0, 0, 0, .45);
        }

        /* BTN 2 — the good one */
        .btn2-wrapper {
            position: relative;
            width: 100%;
        }

        .pulse-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50px;
            background: rgba(233, 30, 140, .35);
            animation: pulse 2s ease-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: .7;
            }

            70% {
                transform: scale(1.08);
                opacity: 0;
            }

            100% {
                transform: scale(1.08);
                opacity: 0;
            }
        }

        #btn2 {
            background: var(--btn2-bg);
            color: #fff;
            box-shadow: 0 8px 28px rgba(233, 30, 140, .45);
        }

        #btn2:hover {
            transform: scale(1.04);
            box-shadow: 0 12px 36px rgba(233, 30, 140, .55);
        }

        #btn2:active {
            transform: scale(.97);
        }

        /* SUCCESS SCREEN */
        .success-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .success-screen.show {
            display: flex;
        }

        .success-title {
            font-size: clamp(1.5rem, 6vw, 2.3rem);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 4px 20px rgba(0, 0, 0, .2);
            animation: popIn .6s cubic-bezier(.175, .885, .32, 1.275) both;
        }

        .success-sub {
            font-size: clamp(.95rem, 3.8vw, 1.25rem);
            font-weight: 700;
            color: #fff5f5;
            animation: popIn .6s .15s cubic-bezier(.175, .885, .32, 1.275) both;
        }

        .success-heart {
            font-size: 3.2rem;
            animation: heartBeat 1s ease infinite;
        }

        .success-motiv {
            font-size: clamp(.88rem, 3vw, 1rem);
            color: rgba(255, 255, 255, .85);
            font-style: italic;
            margin-top: 4px;
            font-weight: 600;
            animation: popIn .6s .3s cubic-bezier(.175, .885, .32, 1.275) both;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(.6) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes heartBeat {

            0%,
            100% {
                transform: scale(1);
            }

            14% {
                transform: scale(1.3);
            }

            28% {
                transform: scale(1);
            }

            42% {
                transform: scale(1.15);
            }

            70% {
                transform: scale(1);
            }
        }

        /* CONFETTI */
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -20px;
            border-radius: 2px;
            pointer-events: none;
            z-index: 9000;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* SPARKLES */
        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 9500;
            font-size: 1.2rem;
            animation: sparklePop .8s ease forwards;
        }

        @keyframes sparklePop {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 1;
            }

            60% {
                transform: scale(1.4) rotate(30deg);
                opacity: 1;
            }

            100% {
                transform: scale(0) rotate(60deg);
                opacity: 0;
            }
        }

        /* MOBILE — small phones */
        @media (max-width: 380px) {
            .card {
                padding: 28px 14px 34px;
            }
        }
    </style>
</head>

<body>

    <div class="emoji-rain" id="emojiRain"></div>

    <div class="card" id="mainCard">

        <!-- INITIAL CONTENT -->
        <div id="initialContent">
            <span class="sub-emoji">🌧️</span>
            <h1 class="heading">
                Ungalukku ipo konjam kastama irukunu theriyudhu...
            </h1>

            <div class="buttons-area" id="buttonsArea">

                <!-- BTN 1 lives here in normal flow until first escape -->
                <button class="btn" id="btn1">
                    Vaalkaaye romba kastama irukuu 😔
                </button>

                <!-- BTN 2 -->
                <div class="btn2-wrapper">
                    <div class="pulse-ring"></div>
                    <button class="btn" id="btn2" onclick="handleHappy()">
                        Vaalka kastama irundha enna ipo... naa paathukuran ❤️
                    </button>
                </div>

            </div>
        </div>

        <!-- SUCCESS CONTENT -->
        <div class="success-screen" id="successScreen">
            <div class="success-heart">🎉</div>
            <p class="success-title">CONGRATULATIONS 🎉</p>
            <p class="success-sub">supernga....apdidhaa paathhukalam vidunga!</p>
            <p class="success-sub" style="font-size:clamp(1.2rem,5vw,1.6rem)">stay happyyy 🌈</p>
            <p class="success-motiv">✨ Ellam sari aagum. Idhum kadandhu pogum. ✨</p>
        </div>

    </div>

    <!-- Full-screen container: btn1 lives here once it starts escaping -->
    <div id="escapeZone"></div>

    <script>
        /* ===== STATE ===== */
        let attempts = 0;
        let isFloating = false;  // true once btn1 is position:fixed
        let busy = false;  // debounce: ignore events while animating

        const btn1 = document.getElementById('btn1');
        const body = document.body;

        /* ===== EMOJI RAIN ===== */
        (function initRain() {
            const rain = document.getElementById('emojiRain');
            const emojis = ['😢', '😔', '🌧️', '💧', '☁️', '🥺'];
            for (let i = 0; i < 18; i++) {
                const drop = document.createElement('span');
                drop.classList.add('rain-drop');
                drop.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDuration = (4 + Math.random() * 6) + 's';
                drop.style.animationDelay = (Math.random() * 5) + 's';
                drop.style.fontSize = (16 + Math.random() * 16) + 'px';
                rain.appendChild(drop);
            }
        })();

        /* ===== ATTACH ESCAPE EVENTS (JS side so we can preventDefault) ===== */
        btn1.addEventListener('mouseenter', triggerEscape);
        btn1.addEventListener('touchstart', function (e) {
            e.preventDefault();   // stop the subsequent click from also firing
            triggerEscape();
        }, { passive: false });
        btn1.addEventListener('click', triggerEscape);

        const escapeZone = document.getElementById('escapeZone');

        function triggerEscape() {
            if (busy) return;
            busy = true;
            attempts++;

            if (!isFloating) {
                // Measure btn1's current on-screen position
                const rect = btn1.getBoundingClientRect();
                // Move btn1 into escapeZone (position:absolute inside fixed overlay)
                escapeZone.appendChild(btn1);
                btn1.classList.add('floating');
                btn1.style.transition = 'none';
                btn1.style.left = rect.left + 'px';
                btn1.style.top = rect.top + 'px';
                isFloating = true;
                // Let browser paint the element inside the new container, then move
                setTimeout(moveRandomly, 50);
            } else {
                moveRandomly();
            }
        }

        function moveRandomly() {
            // escapeZone fills exactly the viewport — its dimensions are ground truth
            const zW = escapeZone.clientWidth;
            const zH = escapeZone.clientHeight;

            // Read button's rendered size (it's now inside escapeZone)
            const btnW = btn1.offsetWidth || 250;
            const btnH = btn1.offsetHeight || 54;
            const margin = 14;

            // Safe range: button left/top must land within [margin, zone - btn - margin]
            const maxX = Math.max(margin, zW - btnW - margin);
            const maxY = Math.max(margin, zH - btnH - margin);

            // Current position inside the overlay
            const curX = parseFloat(btn1.style.left) || 0;
            const curY = parseFloat(btn1.style.top) || 0;

            // Pick a spot sufficiently far from current
            let newX, newY, tries = 0;
            do {
                newX = margin + Math.random() * (maxX - margin);
                newY = margin + Math.random() * (maxY - margin);
                tries++;
            } while (tries < 20 &&
            Math.abs(newX - curX) < 70 &&
                Math.abs(newY - curY) < 70);

            // Final clamp — overflow:hidden on the zone is the physical backup
            newX = Math.max(margin, Math.min(newX, maxX));
            newY = Math.max(margin, Math.min(newY, maxY));

            btn1.style.transition = 'left .38s cubic-bezier(.22,1,.36,1), top .38s cubic-bezier(.22,1,.36,1)';
            btn1.style.left = newX + 'px';
            btn1.style.top = newY + 'px';

            setTimeout(() => { busy = false; }, 420);

            if (attempts % 4 === 0) {
                body.classList.add('shake');
                setTimeout(() => body.classList.remove('shake'), 600);
            }
            addSparkle();
        }

        function addSparkle() {
            const sp = document.createElement('span');
            sp.classList.add('sparkle');
            sp.textContent = ['✨', '💫', '⭐', '🌟'][Math.floor(Math.random() * 4)];
            sp.style.left = (10 + Math.random() * 80) + 'vw';
            sp.style.top = (10 + Math.random() * 80) + 'vh';
            document.body.appendChild(sp);
            setTimeout(() => sp.remove(), 850);
        }

        /* ===== HAPPY CLICK ===== */
        function handleHappy() {
            btn1.style.opacity = '0';
            btn1.style.pointerEvents = 'none';

            document.getElementById('initialContent').style.display = 'none';
            document.getElementById('successScreen').classList.add('show');
            body.classList.add('happy');
            document.getElementById('emojiRain').style.display = 'none';

            launchConfetti();

            const happyEmojis = ['🎉', '❤️', '🌈', '😊', '🥳', '💖', '✨', '🌸'];
            for (let i = 0; i < 22; i++) {
                setTimeout(() => {
                    const sp = document.createElement('span');
                    sp.classList.add('sparkle');
                    sp.style.fontSize = (20 + Math.random() * 22) + 'px';
                    sp.textContent = happyEmojis[Math.floor(Math.random() * happyEmojis.length)];
                    sp.style.left = (5 + Math.random() * 90) + 'vw';
                    sp.style.top = (5 + Math.random() * 90) + 'vh';
                    sp.style.animationDuration = '1.2s';
                    document.body.appendChild(sp);
                    setTimeout(() => sp.remove(), 1300);
                }, i * 150);
            }
        }

        /* ===== CONFETTI ===== */
        function launchConfetti() {
            const colors = [
                '#ff4d6d', '#ffd166', '#06d6a0', '#118ab2',
                '#f8961e', '#f3722c', '#a7c957', '#e89b40',
                '#ff85a1', '#b5e48c', '#90e0ef', '#c77dff'
            ];
            for (let i = 0; i < 160; i++) {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.classList.add('confetti-piece');
                    const shape = Math.random();
                    if (shape < .33) { p.style.borderRadius = '50%'; }
                    else if (shape < .66) { p.style.borderRadius = '0'; p.style.width = (6 + Math.random() * 8) + 'px'; p.style.height = (12 + Math.random() * 10) + 'px'; }
                    else { p.style.width = p.style.height = (8 + Math.random() * 8) + 'px'; }
                    p.style.left = Math.random() * 100 + 'vw';
                    p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    p.style.animationDuration = (2.5 + Math.random() * 3.5) + 's';
                    p.style.animationDelay = (Math.random() * 1.2) + 's';
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 6500);
                }, i * 22);
            }
        }

        /* ===== KEEP floating btn1 on-screen after resize ===== */
        window.addEventListener('resize', () => {
            if (!isFloating) return;
            const btnW = btn1.offsetWidth || 200;
            const btnH = btn1.offsetHeight || 54;
            const curL = parseFloat(btn1.style.left) || 0;
            const curT = parseFloat(btn1.style.top) || 0;
            btn1.style.transition = 'none';
            btn1.style.left = Math.min(Math.max(12, curL), window.innerWidth - btnW - 12) + 'px';
            btn1.style.top = Math.min(Math.max(12, curT), window.innerHeight - btnH - 12) + 'px';
        });
    </script>
</body>

</html>
